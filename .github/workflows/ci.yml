name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # The package targets `.macOS("27.0")` only — `FoundationModelsCodeContext`
    # (the live edit-diagnostics dependency) declares macOS 27 as its floor and
    # spawns `sourcekit-lsp` subprocesses, so it cannot build or run on Linux or
    # older macOS images. `macos-latest` tracks GitHub's newest available macOS
    # image; the `swift build` step below fails loudly if that image is older
    # than the package's macOS 27 deployment floor.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      # Belt-and-suspenders for the real-LSP integration tier (plan §9.6): the
      # error-detection suite skips locally when sourcekit-lsp is absent, and its
      # in-suite CI gate turns that absence into a failure when `CI` is set — but
      # asserting the tool here too means the job fails fast and unmistakably if
      # the runner image ever ships without sourcekit-lsp, so the LSP tier can
      # never silently vanish from CI.
      - name: Assert sourcekit-lsp is available
        run: xcrun --find sourcekit-lsp

      - name: Test
        run: swift test
