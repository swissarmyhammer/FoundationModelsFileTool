name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one self-hosted macOS runner backs this repo, so without this a queue
# of superseded pushes stacks up single-file behind whatever is currently
# running — each new commit waiting hours for every older, already-obsolete
# run to finish first. Cancelling the in-progress run for the same ref as
# soon as a newer commit lands keeps the queue to at most one run deep.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Self-hosted macOS runner: the package targets `.macOS("27.0")` only —
    # `FoundationModelsCodeContext` (the live edit-diagnostics dependency)
    # declares macOS 27 as its floor and spawns `sourcekit-lsp` subprocesses, so
    # the package cannot build or run on Linux or older macOS images. No
    # GitHub-hosted image satisfies the macOS 27 floor, so CI runs on a
    # self-hosted macOS runner.
    runs-on: [self-hosted, macOS]
    # A hard ceiling so a stuck run (e.g. a runaway sourcekit-lsp background
    # index) fails loudly and frees the one self-hosted runner for the next
    # commit, instead of sitting in progress indefinitely.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # sourcekit-lsp's background indexer eagerly prepares every target in
      # the *whole* resolved package graph — including dev-only targets (e.g.
      # a dependency-of-a-dependency's own Benchmarks target) that nothing in
      # this package ever builds or imports, which can fan out into a deeply
      # recursive `.build/index-build/checkouts/.../checkouts/...`
      # resolve-and-build chain. This was suspected (not confirmed — the
      # process observed doing this was on an unrelated machine, not this
      # runner) as a contributor to the Test step hanging; local timing later
      # showed the real-LSP suite itself is not the bottleneck, so this is
      # kept as a cheap, low-risk precaution rather than the fix. The real-LSP
      # integration tests only need on-demand, per-file diagnostics (see
      # `DiagnosticsProbe.awaitDiagnostics`), never proactive whole-graph
      # indexing, so disabling it costs nothing. Scoped to the CI workspace
      # only (not committed) so local interactive editors keep normal
      # background indexing.
      - name: Disable sourcekit-lsp background indexing for CI
        run: |
          mkdir -p .sourcekit-lsp
          cat > .sourcekit-lsp/config.json <<'EOF'
          {
            "backgroundIndexing": false
          }
          EOF

      - name: Build
        run: swift build

      # Belt-and-suspenders for the real-LSP integration tier (plan §9.6): the
      # error-detection suite skips locally when sourcekit-lsp is absent, and its
      # in-suite CI gate turns that absence into a failure when `CI` is set — but
      # asserting the tool here too means the job fails fast and unmistakably if
      # the runner image ever ships without sourcekit-lsp, so the LSP tier can
      # never silently vanish from CI.
      - name: Assert sourcekit-lsp is available
        run: xcrun --find sourcekit-lsp

      # Split from the integration tier below on purpose: the hermetic unit
      # tier (~1,300 tests, mocked resolvers, no subprocess) reliably finishes
      # in well under a second locally and in CI alike, so it gets no special
      # timeout — a hang here would be a real, novel bug worth the full job
      # budget to surface.
      - name: Unit tests (FileToolTests)
        run: swift test --filter FileToolTests

      # A run on this exact CI runner previously sat completely silent for 45
      # minutes on this step before the job timeout killed it — yet the
      # identical suite (real sourcekit-lsp, all 7 suites, 26 tests) finishes
      # in ~16 seconds locally. Call-stack sampling (see git history on this
      # step) proved the hang is real: `editsOKMatrix`, `errorDetectionMatrix`,
      # and the type-isolation test all start and never resolve, well past
      # their 30-second `requestTimeout`. Every sample caught
      # `FileToolIntegrationTests`'s reader thread blocked in `read(2)` on
      # sourcekit-lsp's stdout, AND sourcekit-lsp's own thread blocked in
      # `read(2)` on its stdin — neither side stuck doing anything, just
      # waiting on each other — while up to 5 sourcekit-lsp instances were
      # alive at once. That's because the 4 `.serialized` real-LSP suites
      # (CrossOpFlowTests, EditsOKTests, ErrorDetectionTests, MultiProjectTests)
      # are each serial *internally* but run concurrently with *each other*,
      # so a combined `swift test` opens up to 5 connections at once, each
      # parking 2 detached tasks in a blocking syscall. That's the textbook
      # shape of Swift Concurrency's cooperative thread pool running out of
      # worker threads — enough permanently-blocked detached tasks leaves no
      # thread free to run anything else, including the timeout task meant to
      # rescue exactly this case. Running the 4 real-LSP suites one at a time
      # bounds it to at most one live sourcekit-lsp connection, testing that
      # theory directly and working around it if true, without touching the
      # `FoundationModelsCodeContext` dependency that owns the connection code.
      - name: Integration tests (FileToolIntegrationTests)
        timeout-minutes: 3
        run: |
          run_and_sample() {
            script -q /dev/null swift test "$@" -v &
            local DRIVER_PID=$!
            for i in $(seq 1 4); do
              sleep 10
              kill -0 "$DRIVER_PID" 2>/dev/null || break
              echo "::group::diagnostic sample ($*) at ~$((i * 10))s"
              ps -axo pid,ppid,pcpu,etime,command | grep -iE "FileToolIntegrationTests|swiftpm-testing|sourcekit-lsp" | grep -v grep || echo "no matching test process found"
              for PID in $(pgrep -f "FileToolIntegrationTests|swiftpm-testing|sourcekit-lsp"); do
                echo "-- sampling $PID --"
                /usr/bin/sample "$PID" 1 -mayDie 2>&1 || true
              done
              echo "::endgroup::"
            done
            wait "$DRIVER_PID"
          }

          for SUITE in CrossOpFlowTests EditsOKTests ErrorDetectionTests MultiProjectTests; do
            echo "::group::suite $SUITE"
            run_and_sample --filter "$SUITE"
            echo "::endgroup::"
          done
          run_and_sample --filter FileToolIntegrationTests --skip CrossOpFlowTests --skip EditsOKTests --skip ErrorDetectionTests --skip MultiProjectTests
